services:
  test-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      # Tests are read-only source; copied to writable /workspace/tests at runtime
      - ./tests:/tests:ro
      - ./test-results:/test-results
    environment:
      - CI=true
      - NODE_ENV=test
    working_dir: /workspace
    command: ["-c", "export TARBALL_PATH=$(ls /build/gingacodemonkey-config-*.tgz | head -1) && cp -r /tests /workspace/tests && cd /workspace/tests && pnpm install && pnpm test"]

  test-debug:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./tests:/tests:ro
      - ./test-results:/test-results
    environment:
      - CI=true
      - NODE_ENV=test
    working_dir: /workspace
    stdin_open: true
    tty: true
    profiles:
      - debug